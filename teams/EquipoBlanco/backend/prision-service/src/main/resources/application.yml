spring:
  application:
    name: EQUIPO-BLANCO-PRISON-SERVICE
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
  codec:
    max-in-memory-size: 15MB

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8081
  tomcat:
    max-http-form-post-size: 15MB
    max-swallow-size: 15MB

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
