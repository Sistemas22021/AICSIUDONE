spring:
  application:
    name: EQUIPO-BLANCO-PRISON-SERVICE
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${DATASOURCE_URL}&prepareThreshold=0
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  jackson:
    max-string-length: 50000000

server:
  port: 8081
  tomcat:
    max-http-form-post-size: 50MB
    max-swallow-size: 50MB
    max-http-header-size: 128KB
  max-http-request-header-size: 128KB

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
