$kind: http-request
name: Crear Subtipo de Delito
method: POST
url: '{{baseUrl}}/api/v1/subtipos-delito'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nombre": "Nombre del subtipo de delito",
      "descripcion": "Descripción del subtipo de delito",
      "tipoDelitoId": 1
    }
