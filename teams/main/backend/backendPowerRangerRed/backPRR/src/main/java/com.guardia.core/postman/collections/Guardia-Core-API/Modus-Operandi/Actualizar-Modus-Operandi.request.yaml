$kind: http-request
name: Actualizar Modus Operandi
method: PUT
url: '{{baseUrl}}/api/v1/modus-operandi/{{modusId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "nombre": "Nombre actualizado del modus operandi",
      "descripcion": "Descripción actualizada",
      "patron": "Patrón actualizado"
    }
