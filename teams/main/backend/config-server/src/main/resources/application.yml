server:
  port: 8888  # Puerto estándar del Spring Cloud Config Server

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          # URI del directorio config-repo dentro del mismo monorepo.
          # En desarrollo local, apunta al filesystem.
          # En producción (GitHub Actions), se sobreescribe con la URL del repo.
          uri: file://${CONFIG_REPO_PATH:../../../config-repo}
          # Rama a usar para leer la configuración
          default-label: main
          # Clona de forma "lazy" (al primer request), no al arrancar
          clone-on-start: false

# Eureka: el Config Server también se registra para que otros lo descubran
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh
