server:
  port: 8090

spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    gateway:
      # Activar integración con Eureka para load balancing (lb://)
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true  # auth-service en lugar de AUTH-SERVICE en URL

# Eureka
eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

# JWT secret — debe coincidir EXACTAMENTE con el del Auth Service
sso:
  auth:
    jwt-secret: ${JWT_SECRET:este-es-un-secreto-de-desarrollo-cambiar-en-produccion-32chars}

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
