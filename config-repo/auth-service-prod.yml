# Configuración del Auth Service para el ambiente PROD
# Las variables sensibles siempre vienen de GitHub Secrets → ECS Task Definition env vars

spring:
  datasource:
    url: ${DATASOURCE_URL}      # Neon/Supabase en Fase 1, RDS en Fase 2
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 3      # Más conservador en producción
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate        # ⚠️ IMPORTANTE: nunca 'update' en producción
    show-sql: false

sso:
  auth:
    jwt-secret: ${JWT_SECRET}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 7

logging:
  level:
    com.sso: INFO
    root: WARN
