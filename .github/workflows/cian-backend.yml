# ─────────────────────────────────────────────────────────────
# Pipeline: Backend Equipo Azul-Cian
#
# Valida automáticamente los cambios realizados en el backend
# del equipo Azul-Cian cuando existen modificaciones sobre main
# o sobre la rama de desarrollo (dev-rama-equipo-cian).
#
# Flujo:
# Build → Test → Feedback
#
# No incluye despliegue porque el backend se ejecuta localmente.
# El pipeline garantiza que los cambios integrados en desarrollo
# y producción mantengan la calidad y estabilidad del microservicio.
# ─────────────────────────────────────────────────────────────

name: "[Backend] Equipo Azul-Cian"

on:
  push:
    branches:
      - main
      - dev-rama-equipo-cian
    paths:
      - "teams/main/backend/equipo-azul-cian/backend/**"

  pull_request:
    branches:
      - main
      - dev-rama-equipo-cian
    paths:
      - "teams/main/backend/equipo-azul-cian/backend/**"

  workflow_dispatch:

jobs:
  build:
    name: "Build Backend"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: teams/main/backend/equipo-azul-cian/backend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Construir proyecto
        run: ./mvnw clean package -DskipTests

  test:
    name: "Tests Unitarios Backend"
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        working-directory: teams/main/backend/equipo-azul-cian/backend

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas unitarias
        run: ./mvnw test