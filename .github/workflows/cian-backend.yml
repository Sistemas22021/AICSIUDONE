# ─────────────────────────────────────────────────────────────
# Pipeline: Backend Equipo Azul-Cian
#
# Valida automáticamente los cambios realizados en el backend.
#
# Flujo:
# Compile → Unit Tests → Feedback
#
# No incluye despliegue porque el backend se ejecuta localmente.
# ─────────────────────────────────────────────────────────────


name: "[Backend] Equipo Azul-Cian"


on:

  push:
    branches:
      - rama-equipo-cian
    paths:
      - "teams/main/backend/equipo-azul-cian/backend/**"


  pull_request:
    branches:
      - rama-equipo-cian
    paths:
      - "teams/main/backend/equipo-azul-cian/backend/**"


  workflow_dispatch:



jobs:


  compile:


    name: "Compile Backend"


    runs-on: ubuntu-latest


    defaults:
      run:
        working-directory: teams/main/backend/equipo-azul-cian/backend



    steps:


      - name: Checkout del repositorio
        uses: actions/checkout@v4



      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven



      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw



      - name: Compilar proyecto
        run: ./mvnw compile



  tests:


    name: "Unit Tests Backend"


    runs-on: ubuntu-latest


    needs: compile


    defaults:
      run:
        working-directory: teams/main/backend/equipo-azul-cian/backend



    steps:


      - name: Checkout del repositorio
        uses: actions/checkout@v4



      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven



      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw



      - name: Ejecutar pruebas unitarias
        run: ./mvnw test
