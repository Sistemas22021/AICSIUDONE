name: "[Frontend] Consumer App"

on:
  push:
    branches: [main, develop]
    paths:
      - "teams/main/frontend/consumer-app/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "teams/main/frontend/consumer-app/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: teams/main/frontend/consumer-app

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/main/frontend/consumer-app/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests

  build-and-deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/main/frontend/consumer-app/package-lock.json
      - run: npm ci
      - name: Build de producción
        run: npm run build
        env:
          VITE_API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL }}
          VITE_LOGIN_MFE_URL: ${{ secrets.LOGIN_MFE_URL }}

      # ── Deploy a S3 ──────────────────────────────────────────────────────
      - name: Deploy a S3 (DEV)
        if: github.ref == 'refs/heads/main' && secrets.DEPLOY_TARGET == 's3'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_CONSUMER_APP_DEV }} --delete
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_CONSUMER_APP_DEV }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Deploy a S3 (PROD)
        if: startsWith(github.ref, 'refs/tags/v') && secrets.DEPLOY_TARGET == 's3'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_CONSUMER_APP_PROD }} --delete

      # ── Deploy a Vercel ──────────────────────────────────────────────────
      - name: Deploy a Vercel (DEV)
        if: github.ref == 'refs/heads/main' && secrets.DEPLOY_TARGET == 'vercel'
        run: |
          npm install -g vercel
          vercel --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CONSUMER_APP }}

      - name: Deploy a Vercel (PROD)
        if: startsWith(github.ref, 'refs/tags/v') && secrets.DEPLOY_TARGET == 'vercel'
        run: |
          npm install -g vercel
          vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CONSUMER_APP }}
