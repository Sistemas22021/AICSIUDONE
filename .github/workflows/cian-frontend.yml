# ─────────────────────────────────────────────────────────────────────────────
# Pipeline: Frontend Equipo Azul-Cian
#
# IMPORTANTE: Este pipeline es INDEPENDIENTE de todos los demás equipos.
# Solo se activa cuando existen cambios dentro de la carpeta del frontend
# del equipo Azul-Cian en la rama principal main.
#
# El filtro paths evita ejecuciones innecesarias cuando otros equipos
# modifican diferentes módulos del repositorio.
#
# Sin el filtro `paths`, cualquier commit realizado sobre main,
# incluso cambios pertenecientes a otros equipos, ejecutaría este pipeline.
#
# Flujo de Jobs: Build → Lint → Test → Deploy (Vercel) → Smoke Test
# ─────────────────────────────────────────────────────────────────────────────

name: "[Frontend] Equipo Azul-Cian"

on:
  push:
    branches:
      - main
    paths:
      - "teams/main/frontend/equipo-azul-cian/frontend/**"

  pull_request:
    branches:
      - main
    paths:
      - "teams/main/frontend/equipo-azul-cian/frontend/**"

  # Permite ejecutar el pipeline manualmente desde la UI de GitHub,
  # útil para re-ejecutar tras configurar Secrets o para depurar.
  workflow_dispatch:

# NOTA: El working-directory NO se define aquí de forma global.
# Se define por Job para que solo aplique a los Jobs que trabajan
# con el código fuente del frontend (Build, Lint, Test).
# Los Jobs de Deploy y Smoke Test no necesitan estar en esa carpeta.

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: Build
#
# Primera barrera de calidad. Si el proyecto no compila, no tiene sentido
# ejecutar lint ni tests. Se usa `npm ci` (en lugar de `npm install`) porque
# instala exactamente lo que está en el package-lock.json sin modificarlo,
# garantizando builds reproducibles en CI.
#
# El artefacto `dist/` se sube para que el Job de Deploy lo descargue
# directamente sin necesidad de re-compilar.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teams/main/frontend/equipo-azul-cian/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/main/frontend/equipo-azul-cian/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build de producción
        run: npm run build

      - name: Subir artefacto dist/
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: teams/main/frontend/equipo-azul-cian/frontend/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Lint
  #
  # Analiza el código con ESLint. Se ejecuta después del Build porque si el
  # proyecto ni compila, el lint no aporta valor. Además, el Build ya valida
  # errores de TypeScript (más graves que problemas de estilo).
  #
  # Si detecta errores, el pipeline falla aquí y los Jobs siguientes
  # (Test, Deploy) no se ejecutan.
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint"
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: teams/main/frontend/equipo-azul-cian/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/main/frontend/equipo-azul-cian/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Lint
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Test
  #
  # Ejecuta los tests unitarios con Vitest. Se ejecuta después del Lint
  # porque si el código no pasa las reglas de calidad mínima, tampoco
  # tiene sentido ejecutar tests.
  #
  # `npm test` ejecuta `vitest run`, que termina el proceso al finalizar
  # (a diferencia de `vitest` sin argumentos, que queda en modo watch
  # y bloquearía el pipeline indefinidamente).
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: "Test"
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: teams/main/frontend/equipo-azul-cian/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/main/frontend/equipo-azul-cian/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy
  #
  # El despliegue a producción es gestionado de manera automática por Vercel
  # al detectar nuevos commits en la rama main.
  #
  # Solo se ejecuta en eventos `push`, nunca en Pull Requests, porque
  # desplegar desde una PR significaría publicar código no revisado aún.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefacto dist/
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: teams/main/frontend/equipo-azul-cian/frontend/dist/

      - name: Deploy gestionado por Vercel
        run: echo "El despliegue automático es gestionado por Vercel al detectar cambios en main."

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Smoke Test (Test de Aprobación)
  #
  # El Smoke Test es el Test de Aprobación del pipeline. Valida que la URL
  # pública responda con HTTP 200, confirmando que la aplicación quedó
  # efectivamente publicada y accesible en Vercel.
  # ─────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: "Smoke Test (Test de Aprobación)"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'

    steps:
      - name: Verificar disponibilidad del frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://equipo-cian-frontend.vercel.app/)

          echo "Código HTTP recibido: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: El frontend no responde correctamente."
            exit 1
          fi

          echo "OK: El frontend está disponible."
