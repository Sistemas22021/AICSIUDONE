name: Power Ranger Red - Backend CI

on:
  push:
    paths:
      - 'teams/main/backend/backenPowerRangerRed/backPRR/**' # Monitorea solo tu carpeta
    branches-ignore:
      - main
  pull_request:
    paths:
      - 'teams/main/backend/backenPowerRangerRed/backPRR/**'
    branches:
      - main

jobs:
  pruebas-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar y Probar Módulo Ranger Red
        run: ./mvnw clean package
        working-directory: ./teams/main/backend/backenPowerRangerRed/backPRR # Entra exacto a tu carpeta