name: Naranja - Backend Build Dev

on:
  push:
    branches: [ naranja-dev/main ]
    paths:
      - 'teams/naranja/Backend/**'
  pull_request:
    branches: [ naranja-dev/main ]
    paths:
      - 'teams/naranja/Backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teams/naranja/Backend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v6

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar y Ejecutar Pruebas
        run: mvn clean verify
        env:
          DB_URL: ${{ secrets.NARANJA_DB_URL }}
          DB_USER: ${{ secrets.NARANJA_DB_USER }}
          DB_PASSWD: ${{ secrets.NARANJA_DB_PASSWD }}

      - name: Guardar el archivo .JAR generado
        uses: actions/upload-artifact@v4
        with:
          name: custodia-360-backend-jar # El nombre que tendrá el archivo descargable
          path: teams/naranja/Backend/target/*.jar     # La ruta donde Maven escupe el binario
          retention-days: 7