name: "[Equipo Blanco][Backend] Prision Service"

# ─── CONFIGURACIÓN DEL PIPELINE ──────────────────────────────────────────────
# Ramas que activan el pipeline:
#   equipoBlanco  → Push o PR ejecutan test + build
#   main          → Push o PR ejecutan test + build
#
# Ramas que NO activan el pipeline (ej: equipoblanco-dev):
#   Cualquier rama que no esté listada abajo no dispara nada automáticamente.
#   Se puede ejecutar manualmente desde GitHub UI o CLI (workflow_dispatch).
#
# Ramas para pull_request:
#   Solo se permiten PRs hacia equipoBlanco o main. PRs desde equipoblanco-dev
#   hacia main NO ejecutarán tests porque 'main' no está en la lista de PR triggers.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, equipoBlanco]
    paths:
      - "teams/EquipoBlanco/backend/prision-service/**"
  pull_request:
    branches: [equipoBlanco, main]
    paths:
      - "teams/EquipoBlanco/backend/prision-service/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: teams/EquipoBlanco/backend/prision-service

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - run: mvn test -B

  build:
    name: "Build"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - run: mvn package -DskipTests -B
      - uses: actions/upload-artifact@v4
        with:
          name: prision-service-jar
          path: teams/EquipoBlanco/backend/prision-service/target/*.jar
