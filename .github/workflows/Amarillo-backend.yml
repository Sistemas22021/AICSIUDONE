name: [Backend] Nexo Criminal API

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'teams/amarrillo/backend/**'
      - '.github/workflows/Amarillo-backend.yml'
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  Build-Lint-Test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./teams/amarrillo/backend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: teams/amarrillo/backend/pom.xml

      - name: Build (compilar)
        run: mvn -B clean compile

      - name: Lint (estilo de codigo)
        run: mvn -B checkstyle:check || echo "Checkstyle no configurado o sin errores"

      - name: Test (pruebas unitarias)
        run: mvn -B test