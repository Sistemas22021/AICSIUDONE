name: CI/CD Backend - Equipo Amarillo

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'teams/amarrillo/**' # Ajustar si tu backend se ubica en otra ruta específica o raíz
      - '.github/workflows/Amarillo-backend.yml'
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'
          cache: 'maven'

      - name: Dar permisos de ejecución a Maven Wrapper
        run: chmod +x ./mvnw || echo "No Maven wrapper found"

      - name: Compilar y Ejecutar Pruebas con Maven
        run: mvn clean package -B
        
      - name: Validar artefacto generado
        run: ls -la target/ || ls -la **/target/