name: Naranja - Frontend Deploy Dev

on:
  push:
    branches:
      - naranja-dev/main
      - main
    paths:
      - 'teams/naranja/Frontend/**'

  pull_request:
    branches:
      - naranja-dev/main
      - main
    paths:
      - 'teams/naranja/Frontend/**'

jobs:
  # ==========================================
  # 1. Pipeline de Compilación (Build)
  # ==========================================
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teams/naranja/Frontend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: teams/naranja/Frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Construir aplicación (Build)
        run: npm run build

      # Guardamos el resultado del build para que el job de deploy pueda usarlo
      - name: Subir artefacto de construcción
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: teams/naranja/Frontend/.next # O la carpeta de salida de tu build (ej: dist, build, .next)
          retention-days: 1

  # ==========================================
  # 2. Pipeline de Despliegue (Deploy)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build # Este job solo corre si 'build' termina con éxito
    defaults:
      run:
        working-directory: teams/naranja/Frontend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar artefacto de construcción
        uses: actions/artifact-download-action@v4
        with:
          name: build-output
          path: teams/naranja/Frontend/.next

      - name: Deploy a Vercel (Preview)
        run: |
          npm install -g vercel
          vercel --token=${{ secrets.NARANJA_VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.NARANJA_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.NARANJA_VERCEL_PROJECT_ID }}