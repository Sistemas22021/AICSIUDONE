name: Naranja - Frontend Deploy Dev

on:
  push:
    branches: 
      - naranja-dev/main
      - main
    paths:
      - 'teams/naranja/Frontend/**'
      
  pull_request:
    branches: 
      - naranja-dev/main
      - main
    paths:
      - 'teams/naranja/Frontend/**'

jobs:
  # ==========================================
  # 1. Pipeline de Compilación (Build)
  # ==========================================
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teams/naranja/Frontend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: teams/naranja/Frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      # Instalamos Vercel localmente para preparar el build de producción optimizado
      - name: Instalar Vercel CLI
        run: npm install --save-dev vercel

      # Ejecuta el build nativo que Vercel entiende para producción (.vercel/output)
      - name: Construir aplicación con Vercel CLI
        run: npx vercel build --token=${{ secrets.NARANJA_VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.NARANJA_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.NARANJA_VERCEL_PROJECT_ID }}

      # Subimos la carpeta .vercel generada para el despliegue directo
      - name: Subir artefacto de construcción
        uses: actions/upload-artifact@v4
        with:
          name: vercel-production-build
          path: teams/naranja/Frontend/.vercel
          retention-days: 1

  # ==========================================
  # 2. Pipeline de Despliegue (Deploy)
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: teams/naranja/Frontend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Descargamos el build precompilado (.vercel)
      - name: Descargar artefacto de construcción
        uses: actions/download-artifact@v4
        with:
          name: vercel-production-build
          path: teams/naranja/Frontend/.vercel

      # Instalamos Vercel CLI globalmente en este runner para hacer el deploy
      - name: Instalar Vercel CLI
        run: npm install -g vercel

      # Desplegamos directamente usando el build que descargamos (deploy instantáneo)
      - name: Deploy pre-built a Vercel
        run: vercel deploy --prebuilt --token=${{ secrets.NARANJA_VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.NARANJA_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.NARANJA_VERCEL_PROJECT_ID }}
