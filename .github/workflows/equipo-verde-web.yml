name: "[Frontend] Equipo Verde Web"

on:
  push:
    branches: [main, develop]
    paths:
      - "teams/main/equipo-verde/frontend/equipo-verde-web/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "teams/main/equipo-verde/frontend/equipo-verde-web/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: teams/main/equipo-verde/frontend/equipo-verde-web

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: teams/main/equipo-verde/frontend/equipo-verde-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test -- --passWithNoTests

  build-and-deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'   build-and-deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest
    needs: test
    # Ahora permite Push, PRs o ejecuciones Manuales
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: teams/main/equipo-verde/frontend/equipo-verde-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Build de producción
        run: pnpm run build
        env:
          VITE_API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL_BALISTIC }}
          VITE_LOGIN_MFE_URL: ${{ secrets.LOGIN_MFE_URL_BALISTIC }}
      - name: Deploy a Vercel (DEV / Preview)
        if: github.ref == 'refs/heads/develop'
        run: |
          pnpm dlx vercel --token=${{ secrets.VERCEL_TOKEN_BALISTIC }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_BALISTIC }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BALISTIC }}
      - name: Deploy a Vercel (PROD)
        if: github.ref == 'refs/heads/main'
        run: |
          pnpm dlx vercel --token=${{ secrets.VERCEL_TOKEN_BALISTIC }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID_BALISTIC }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BALISTIC }}

