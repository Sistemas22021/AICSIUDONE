name: "[Frontend] Equipo Verde Web"

on:
  push:
    branches: [main, develop]
    paths:
      - "teams/main/equipo-verde/frontend/equipo-verde-web/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "teams/main/equipo-verde/frontend/equipo-verde-web/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: teams/main/equipo-verde/frontend/equipo-verde-web

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/main/equipo-verde/frontend/equipo-verde-web/package-lock.json
      - run: npm ci
      - run: npm test -- --passWithNoTests

  build-and-deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/main/equipo-verde/frontend/equipo-verde-web/package-lock.json
      - run: npm ci
      - name: Build de producción
        run: npm run build
        env:
          VITE_API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL }}
          VITE_LOGIN_MFE_URL: ${{ secrets.LOGIN_MFE_URL }}
