name: Power Ranger Red - Backend CD

on:
  push:
    paths:
      - 'teams/team-red/backend/guardia-core/**'
    branches:
      - main

jobs:
  despliegue-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Configurar Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generar .jar del Módulo Ranger Red
        run: mvn clean package -DskipTests
        working-directory: ./teams/team-red/backend/guardia-core

      - name: Iniciar sesion en GitHub Packages (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Subir Imagen Docker
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO_LOWER/sso-backend-red:latest .
          docker push ghcr.io/$REPO_LOWER/sso-backend-red:latest
        working-directory: ./teams/team-red/backend/guardia-core