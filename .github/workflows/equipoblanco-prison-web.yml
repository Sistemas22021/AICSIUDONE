name: "[Equipo Blanco][Frontend] Prison Web"

on:
  push:
    branches: [main, develop]
    paths:
      - "teams/EquipoBlanco/frontend/prison-web/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "teams/EquipoBlanco/frontend/prison-web/**"
  workflow_dispatch:

defaults:
  run:
    working-directory: teams/EquipoBlanco/frontend/prison-web

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/EquipoBlanco/frontend/prison-web/package-lock.json
      - run: npm ci
      - run: npm test

  build-and-deploy:
    name: "Build & Deploy a Vercel"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: teams/EquipoBlanco/frontend/prison-web/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Deploy a Vercel (DEV)
        if: github.ref == 'refs/heads/develop'
        run: |
          npm install -g vercel
          vercel --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRISON_WEB }}
      - name: Deploy a Vercel (PROD)
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g vercel
          vercel --token=${{ secrets.VERCEL_TOKEN }} --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PRISON_WEB }}
