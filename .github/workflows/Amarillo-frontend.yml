name: [Frontend] Nexo Criminal Web

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'teams/amarrillo/frontend/**'
      - '.github/workflows/Amarillo-frontend.yml'
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  Build-Lint-Test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./teams/amarrillo/frontend

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: teams/amarrillo/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint / Verificaciones
        run: npm run lint --if-present

      - name: Build (construir)
        run: npm run build