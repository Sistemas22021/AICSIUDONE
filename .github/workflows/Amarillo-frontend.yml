name: CI/CD Frontend - Equipo Amarillo

on:
  push:
    branches: [ "main", "master", "develop" ]
    paths:
      - 'teams/EquipoBlanco/frontend/**' # Ajustar al directorio frontend correspondiente del equipo
      - '.github/workflows/Amarillo-frontend.yml'
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./teams/EquipoBlanco/frontend/prison-web # Ajusta esta ruta según la ubicación exacta de tu package.json

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './teams/EquipoBlanco/frontend/prison-web/package-lock.json'

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar Linter / Verificaciones
        run: npm run lint --if-present

      - name: Construir aplicación (Build)
        run: npm run build