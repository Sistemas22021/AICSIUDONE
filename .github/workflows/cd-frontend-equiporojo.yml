name: CD - Frontend (incident-registration)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'teams/team-red/frontend/incident-registration/src/**'
      - 'teams/team-red/frontend/incident-registration/package.json'
      - 'teams/team-red/frontend/incident-registration/Dockerfile'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/incident-registration
  FRONTEND_DIR: teams/team-red/frontend/incident-registration

jobs:
  verify-before-release:
    name: Verificacion final pre-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '${{ env.FRONTEND_DIR }}/package-lock.json'

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build-and-publish:
    name: Build y publicar imagen Docker
    needs: verify-before-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v7

      - name: Autenticarse en GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          file: ${{ env.FRONTEND_DIR }}/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.API_URL_PROD }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
