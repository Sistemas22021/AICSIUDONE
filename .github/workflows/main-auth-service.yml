# ─────────────────────────────────────────────────────────────────────────────
# Pipeline: Auth Service — Equipo main
#
# Se activa SOLO cuando cambian archivos del auth-service (paths filter).
# Un cambio en api-gateway NO activa este pipeline, y viceversa.
#
# Stages:
#   test        → Corre tests unitarios e integración (sin Spring completo)
#   build       → Compila el JAR + construye imagen Docker + push a ECR
#   deploy-dev  → Actualiza el servicio en ECS dev (merge a main)
#   deploy-prod → Actualiza el servicio en ECS prod (tag vX.X.X)
# ─────────────────────────────────────────────────────────────────────────────

name: "[Backend] Auth Service"

on:
  push:
    branches: [main, develop]
    paths:
      - "teams/main/backend/auth-service/**"
      - "config-repo/auth-service*.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "teams/main/backend/auth-service/**"
  # Permite disparar manualmente desde GitHub UI
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sso/auth-service
  ECS_SERVICE: auth-service
  ECS_CLUSTER: sso-cluster

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Tests (Unit + Integration)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: "Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teams/main/backend/auth-service

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Ejecutar tests
        # Los tests de Unit y DataJpaTest (H2) no necesitan BD real
        run: mvn test -B
        env:
          # Variables mínimas para arrancar el contexto de test
          DATASOURCE_URL: jdbc:h2:mem:testdb
          JWT_SECRET: test-secret-para-pruebas-unitarias-32chars

      - name: Publicar reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-auth-service
          path: teams/main/backend/auth-service/target/surefire-reports/

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Build + Push a ECR
  # Solo en push a main o develop (no en PRs)
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: "Build & Push a ECR"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: teams/main/backend/auth-service

    outputs:
      image-tag: ${{ steps.build-image.outputs.image-tag }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Compilar JAR (sin tests, ya corrieron)
        run: mvn package -DskipTests -B

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push de la imagen Docker
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy a DEV
  # Solo cuando se hace merge a main
  # ────────────────────────────────────────────────────────────────────────────
  deploy-dev:
    name: "Deploy → DEV"
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: "0.55.0"

      - name: Terragrunt apply — ECS dev
        working-directory: infrastructure/terragrunt/dev/ecs-ec2
        run: terragrunt apply -auto-approve
        env:
          TF_VAR_auth_service_image_tag: ${{ needs.build.outputs.image-tag }}

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4: Deploy a PROD
  # Solo cuando se crea un tag vX.X.X
  # ────────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: "Deploy → PROD"
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: prod  # Requiere aprobación manual en GitHub Settings

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: "0.55.0"

      - name: Terragrunt apply — ECS prod
        working-directory: infrastructure/terragrunt/prod/ecs-ec2
        run: terragrunt apply -auto-approve
        env:
          TF_VAR_auth_service_image_tag: ${{ needs.build.outputs.image-tag }}
